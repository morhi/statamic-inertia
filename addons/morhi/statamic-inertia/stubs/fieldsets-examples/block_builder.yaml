        common:
          display: Allgemein
          sets:
            text:
              display: Text
              fields:
                -
                  import: block_text
            hero:
              display: Hero
              fields:
                -
                  import: block_hero
            quote:
              display: Quote
              fields:
                -
                  import: block_quote
            card_grid:
              display: 'Card Grid'
