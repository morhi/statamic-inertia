                -
                  import: block_card_grid
            accordion:
              display: Accordion
              fields:
                -
                  import: block_accordion
            image_caption:
              display: 'Image + Caption'
              fields:
                -
                  import: block_image_caption
            masonry_gallery:
              display: 'Masonry Gallery'
              fields:
                -
                  import: block_masonry_gallery
