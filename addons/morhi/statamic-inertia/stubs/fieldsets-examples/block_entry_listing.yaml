title: 'Block: Entry Listing'
fields:
  -
    handle: heading
    field:
      type: text
      display: Heading
      instructions: 'Optional heading shown above the list.'
  -
    handle: collection
    field:
      type: entry_listing_collection
      display: Collection
      required: true
      validate: required
  -
    handle: per_page
    field:
      type: integer
      display: 'Items per page'
      default: 6
      validate: 'required|integer|min:1|max:50'
