# DDEV Statamic nginx config with static caching

server {
    listen 80 default_server;
    listen 443 ssl default_server;

    root /var/www/html/public;
    index index.php index.html;

    ssl_certificate /etc/ssl/certs/master.crt;
    ssl_certificate_key /etc/ssl/certs/master.key;

    include /etc/nginx/monitoring.conf;
    include /mnt/ddev_config/nginx/*.conf;

    # Statamic static cache
    set $try_location @static;

    if ($request_method != GET) {
        set $try_location @not_static;
    }

    if ($http_x_inertia) {
        set $try_location @inertia_cached;
    }

    if ($args ~* "live-preview=(.*)") {
        set $try_location @not_static;
    }

    location / {
        try_files $uri $try_location;
    }

    # X-Cache-Status: HIT is only ever set here, directly on the response nginx serves
    # from disk — that's the one case guaranteed not to involve a further internal
    # redirect. Everything that falls through to PHP (`try_files ... /index.php`) re-enters
    # this server block's rewrite phase from scratch, so nginx variables/add_header set
    # before the redirect don't survive to reach the eventual PHP-handled response — Laravel
    # sets X-Cache-Status: MISS/BYPASS itself instead (see InertiaAwareStaticCache).
    location @static {
        add_header X-Cache-Status "HIT" always;
        try_files /static${uri}_$args.html $uri $uri/ /index.php?$args;
    }

    location @inertia_cached {
        default_type application/json;
        add_header X-Inertia "true" always;
        add_header Vary "X-Inertia" always;
        add_header Cache-Control "no-store" always;
        add_header X-Cache-Status "HIT" always;
        try_files /static/json${uri}_.json /index.php?$args;
    }

    location @not_static {
        try_files $uri /index.php?$args;
    }

    # PHP handling
    location ~ \.php$ {
        fastcgi_pass unix:/run/php-fpm.sock;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Static assets caching
    location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2)$ {
        try_files $uri /index.php?$query_string;
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }

    location ~* \.(?:css|js)$ {
        try_files $uri /index.php?$query_string;
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
